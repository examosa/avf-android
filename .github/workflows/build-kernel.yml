name: Build AVF Guest Kernel

on: workflow_dispatch

env:
  KERNEL_DIR_NAME: android16-guest-kernel  

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Free up disk space
        run: |
          echo '::notice::Removing unnecessary packages and files to free disk space…'

          echo '::group::Cleanup'

          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/local/graalvm \
            /usr/local/share/chromium /usr/local/.ghcup /usr/share/swift \
            /usr/local/julia* /usr/lib/jvm /opt/microsoft /opt/az

          sudo apt-get purge --auto-remove --quiet --yes '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-chrome-stable \
            firefox powershell mono-devel || :

          echo '::endgroup::'

          echo '::notice::Disk space after cleanup'
          df -h /

      - name: Configure ccache
        run: |
          ccache_dir="CCACHE_DIR=$RUNNER_TEMP/ccache"
          export "$ccache_dir"
          sudo apt-get install --quiet --update --yes ccache
          ccache --max-size=5G
          ccache --zero-stats
          # Tell ccache to accept calls from the Android prebuilt clang
          ccache --set-config=compiler_check=content
          echo "$ccache_dir" >> "$GITHUB_ENV"
          echo /usr/lib/ccache >> "$GITHUB_PATH"


      - name: Restore ccache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ runner.temp }}/ccache
          key: ccache-kernel-${{ hashFiles('kernel-config.txt') }}-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-${{ hashFiles('kernel-config.txt') }}-
            ccache-kernel-

      - name: Install dependencies
        run: |
          echo '::group::Apt'

          sudo apt-get install --quiet --yes bc bison build-essential cpio flex \
            libdw-dev libelf-dev libssl-dev lz4 python3 python3-pip wget git

          echo '::endgroup::'

          echo '::group::Repo'

          readonly bin_dir="$HOME/.local/bin"

          curl --create-dirs --fail --output-dir "$bin_dir" \
            --remote-name https://storage.googleapis.com/git-repo-downloads/repo

          chmod a+x "$bin_dir/repo"

          echo "$bin_dir" >> "$GITHUB_PATH"

          echo '::endgroup::'

          echo '::group::Pahole'

          readonly pahole_tag=v1.31
          GIT_ADVICE=0 git clone --branch "$pahole_tag" --depth 1 --{recurse,shallow}-submodules https://kernel.googlesource.com/pub/scm/devel/pahole/pahole.git
          cd pahole
          mkdir build
          cd build
          cmake -DCMAKE_INSTALL_PREFIX=/usr ..
          make -j$(nproc)
          sudo make install
          test "$(pahole --version)" = "$pahole_tag"

          echo '::endgroup::'

      - name: Clone kernel source with repo
        run: |
          mkdir -p "$KERNEL_DIR_NAME"
          cd "$KERNEL_DIR_NAME"

          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global user.name 'github-actions[bot]'

          echo '::group::Sync'
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android16-6.12
          repo sync -c -j$(nproc)
          echo '::endgroup::'

      - name: Build kernel
        working-directory: ${{ env.KERNEL_DIR_NAME }}
        run: |
          cp ../build-kernel.sh ./
          cp ../kernel-config.txt ./original-config-from-phone.txt
          patch -p0 build-kernel.sh ../build-kernel.patch

          echo '::group::Build'
          bash build-kernel.sh
          echo '::endgroup::'

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Save ccache
        if: always()
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ${{ runner.temp }}/ccache
          key: ccache-kernel-${{ hashFiles('kernel-config.txt') }}-${{ github.run_id }}

      - name: Upload vmlinuz artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vmlinuz-docker
          path: ${{ env.KERNEL_DIR_NAME }}/vmlinuz
          if-no-files-found: error
